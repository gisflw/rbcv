name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Cache TinyTeX
        id: cache-tinytex
        uses: actions/cache@v4
        with:
          path: |
            ~/.TinyTeX
            ~/.texlive*
          key: ${{ runner.os }}-tinytex-v1-${{ hashFiles('.github/workflows/pages.yml') }}
          restore-keys: |
            ${{ runner.os }}-tinytex-v1-

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            pandoc

      - name: Install TinyTeX
        if: steps.cache-tinytex.outputs.cache-hit != 'true'
        run: |
          TINYTEX_BIN="$HOME/.TinyTeX/bin/$(uname -m)-linux"
          if [ ! -x "$TINYTEX_BIN/tlmgr" ]; then
            curl -sL https://yihui.org/tinytex/install-bin-unix.sh | sh
          fi
          "$TINYTEX_BIN/tlmgr" install \
            collection-fontsrecommended \
            collection-latexextra \
            collection-latexrecommended \
            collection-xetex \
            noto

      - name: Add TinyTeX to PATH
        run: echo "$HOME/.TinyTeX/bin/$(uname -m)-linux" >> "$GITHUB_PATH"

      - name: Build Hugo site
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build PDF CVs
        run: ruby scripts/build_cv.rb all

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
