experience:
  enable: true
  title: "Experience"
  items:
    - company: "Federal University of Rio Grande do Sul (UFRGS)"
      jobs:
        - name: "Postdoctoral Researcher"
          companyDisplay: "Federal University of Rio Grande do Sul (UFRGS) in partnership with ANA"
          date: "Mar 2026 – present"
          content: |-
            Large-scale hydrological modelling and environmental data analysis to support the development and improvement of national-scale hydrological applications in Brazil, with emphasis on anthropogenic influences and climate-change impacts on water systems.

            Related projects: [National hydrological applications](/projects/national-hydrological-applications/) and [National-scale MGB modelling](/projects/mgb-national-scale/).
        - name: "Postdoctoral Researcher"
          companyDisplay: "Federal University of Rio Grande do Sul (UFRGS) in partnership with SGB"
          date: "Jul 2025 – present"
          content: |-
            Processing and analysis of geospatial and time-series data to enhance flood early warning systems for river basins in Rio Grande do Sul, including water level and streamflow modelling, quality control, validation, and dashboards.

            Related project: [Flood early warning system](/projects/flood-early-warning/).
    - company: "Brazilian National Water Agency (ANA)"
      jobs:
        - name: "Hydrology and geospatial data consultant"
          date: "May 2025 – Nov 2025"
          content: |-
            Modelling and structuring of a relational and geospatial PostgreSQL/PostGIS database to unify and standardize water availability datasets used by ANA, including data modelling, migration routines, processing functions, documentation, and technical training.

            Related project: [Brazilian Hydrological Availability Data System](/tools/brazilian-hydrological-availability-data-system/).
    - company: "Institute of the Brazilian Savannah"
      jobs:
        - name: "Hydrological modelling consultant"
          date: "Jan 2025 – Sep 2025"
          content: |-
            Hydrological modelling and spatial analysis to prioritize interventions for native vegetation protection and restoration in the Cerrado biome, integrating remote sensing, climate time series, land-use maps, Python, and QGIS workflows.

            Related project: [Cerrado hydrological prioritisation](/projects/cerrado-hydrological-prioritisation/).
    - company: "UK Centre for Ecology & Hydrology (UKCEH)"
      jobs:
        - name: "Spatial Data Scientist"
          date: "Jul 2022 – May 2025"
          content: |-
            Spatial data analysis, management, and mapping across projects related to the Water Resources Systems group, including NRFA catchment attributes, LiDAR processing tools for FDRI, and research data curation through EIDC.

            Related projects: [CAMELS-GB v2](/projects/camels-gb-v2/), [NRFA Catchment Attributes](/projects/nrfa-catchment-attributes/), and [FDRI LiDAR](/projects/fdri-lidar/).
    - company: "Federal University of Rio Grande do Sul (UFRGS)"
      jobs:
        - name: "Research Assistant"
          companyDisplay: "Federal University of Rio Grande do Sul (UFRGS) in partnership with ANA"
          date: "Jan 2020 – Jun 2022"
          content: |-
            Hydrological modelling compatibility with vector river networks, national-scale analysis of precipitation, soil moisture, evapotranspiration, and water storage, machine-learning reference-flow regionalization, and support for SEEA-Water in Brazil.

            Related projects: [PhD data integration project](/projects/phd-data-integration/) and [Reference streamflow regionalization](/tools/reference-streamflow-dataset/).

