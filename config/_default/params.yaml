achievements:
  enable: true
  title: "Tools & Datasets"
  items:
    - title: "Rating Curve Explorer"
      content: "Toolset for organizing, visualizing, and doing initial analysis on streamflow data related to rating-curve derivation."
      url: "https://github.com/gisflw/rating-curve-explorer"
    - title: "Brazilian Hydrological Availability Data System"
      content: "ETL framework for consolidating geospatial hydrological data within ANA's water availability data system, with traceable processing over national hydrographic network versions."
      url: "https://github.com/gisflw/db-disphid"
    - title: "Build Hydro Database Brazil"
      content: "Tools for retrieving streamflow and rainfall data from stations of the Brazilian Hydrological Network."
      url: "https://github.com/gisflw/build_hydrodb"
    - title: "Reference Mean and Low Streamflow Dataset"
      content: "Reference streamflows, including long-term mean flow and q95, for more than 400,000 ungauged river points in Brazil, estimated with machine-learning models."
      url: "https://zenodo.org/records/14217002"
    - title: "BHO2MGB"
      content: "QGIS plugin to process the Brazilian coded river network database in the framework of the MGB large-basin hydrological model."
      url: "https://www.ufrgs.br/hge/modelos-e-outros-produtos/bho2mgb/"
    - title: "Topographic Position-based Stream definition (TPS)"
      content: "Algorithm for drainage extraction on digital elevation models based on topographic position."
      url: "https://github.com/gisflw/TPS"
    - title: "Attention UNet for shrub segmentation"
      content: "Deep-learning pipeline used to identify shrub individuals or clumps in drone-derived RGB imagery."
      url: "https://github.com/gisflw/att-unet-shrub-id"

