experience:
  enable: true
  title: "Experience"
  items:
    - company: "Federal University of Rio Grande do Sul (UFRGS)"
      companyUrl: "https://www.ufrgs.br/"
      jobs:
        - name: "Postdoctoral Researcher"
          companyDisplay: "[Federal University of Rio Grande do Sul (UFRGS)](https://www.ufrgs.br/) in partnership with the [National Water and Sanitation Agency (ANA)](https://www.gov.br/ana/pt-br)"
          date: "Mar 2026 – present"
          content: |-
            - Large-scale hydrological modelling and environmental data analysis for national water resources applications in Brazil.
            - Assessment of anthropogenic influences and climate-change impacts on water systems.
            - Modelling work with the Modelo de Grandes Bacias (MGB) large-basin hydrological model.
        - name: "Postdoctoral Researcher"
          companyDisplay: "[Federal University of Rio Grande do Sul (UFRGS)](https://www.ufrgs.br/) in partnership with the [Brazilian Geological Survey (SGB)](https://www.sgb.gov.br/)"
          date: "Jul 2025 – present"
          content: |-
            - Processing and analysis of geospatial and time-series data for flood early warning systems in Rio Grande do Sul.
            - Water level and streamflow modelling, quality control, validation, and dashboard support.
    - company: "Brazilian National Water Agency (ANA)"
      companyUrl: "https://www.gov.br/ana/pt-br"
      jobs:
        - name: "Hydrology and geospatial data consultant"
          date: "May 2025 – Nov 2025"
          content: |-
            - Modelled and structured a relational and geospatial PostgreSQL/PostGIS database for water availability datasets used by the National Water and Sanitation Agency (ANA).
            - Developed data modelling, migration routines, processing functions, documentation, and technical training material.
    - company: "Institute of the Brazilian Savannah"
      jobs:
        - name: "Hydrological modelling consultant"
          date: "Jan 2025 – Sep 2025"
          content: |-
            - Hydrological modelling and spatial analysis to prioritize native vegetation protection and restoration in the Cerrado biome.
            - Integrated remote sensing, climate time series, land-use maps, Python, and QGIS workflows.
    - company: "UK Centre for Ecology & Hydrology (UKCEH)"
      companyUrl: "https://www.ceh.ac.uk/"
      jobs:
        - name: "Spatial Data Scientist"
          date: "Jul 2022 – May 2025"
          content: |-
            - Spatial data analysis, management, and mapping for the Water Resources Systems group.
            - Catchment attribute development for the [National River Flow Archive (NRFA)](https://nrfa.ceh.ac.uk/).
            - LiDAR processing tools for the [Floods and Droughts Research Infrastructure (FDRI)](https://fdri.org.uk/).
            - Research data curation through the [Environmental Information Data Centre (EIDC)](https://eidc.ac.uk/).
    - company: "Federal University of Rio Grande do Sul (UFRGS)"
      companyUrl: "https://www.ufrgs.br/"
      jobs:
        - name: "Research Assistant"
          companyDisplay: "[Federal University of Rio Grande do Sul (UFRGS)](https://www.ufrgs.br/) in partnership with the [National Water and Sanitation Agency (ANA)](https://www.gov.br/ana/pt-br)"
          date: "Jan 2020 – Jun 2022"
          content: |-
            - Hydrological modelling compatibility with vector river networks.
            - National-scale analysis of precipitation, soil moisture, evapotranspiration, and water storage.
            - Machine-learning regionalization of reference streamflows and support for the System of Environmental-Economic Accounting for Water (SEEA-Water) in Brazil.

