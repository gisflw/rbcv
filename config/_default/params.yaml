      content: "Catchment attributes, LiDAR-derived data processing, and environmental dataset curation for UK hydrological research infrastructure."
      image: "/images/projects/profile.png"
      featured:
        name: "Details"
        link: "/projects/ukceh-hydrological-datasets/"
      badges: ["UKCEH", "NRFA", "LiDAR"]
