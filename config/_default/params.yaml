        link: "/projects/flood-early-warning/"
      badges: ["Flood forecasting", "Time series", "Dashboards"]
    - title: "Cerrado hydrological prioritisation"
      content: "Hydrological modelling and spatial analysis to prioritize native vegetation restoration and conservation in the Cerrado biome."
      image: "/images/projects/converter.jpg"
      featured:
        name: "Details"
        link: "/projects/cerrado-hydrological-prioritisation/"
      badges: ["Cerrado", "PLANS", "QGIS"]
