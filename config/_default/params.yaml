about:
  enable: true
  title: "About"
  content: |-
    I am a Brazilian hydrologist, civil engineer, and geospatial data scientist with experience in large-scale hydrological modelling, flood forecasting, water availability, remote sensing, topography, and reproducible environmental data systems.

    My work combines applied research, scientific software development, and data engineering to turn large environmental datasets into useful products for modelling, monitoring, and decision-making.
