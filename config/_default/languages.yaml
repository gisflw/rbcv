    about:
      title: "Sobre mí"
      content: |-
        Siempre me ha fascinado entender cómo funcionan los sistemas naturales y el papel que la tecnología puede desempeñar para comprenderlos. Mi interés por las ciencias ambientales creció junto con una curiosidad por las computadoras y la programación, lo que finalmente me llevó a una carrera que combina estas áreas.

        Mi trabajo se centra en construir herramientas y sistemas de datos para la investigación y la gestión operativa del agua. He trabajado en temas que incluyen modelización hidrológica a gran escala, pronóstico de inundaciones, evaluación de disponibilidad hídrica, teledetección, análisis del terreno e ingeniería de datos geoespaciales. Disfruto especialmente diseñando flujos de trabajo reproducibles que conectan la investigación científica con aplicaciones en el mundo real, siempre con el objetivo de crear sistemas robustos, transparentes y fáciles de extender.

        Me interesan especialmente la modelización ambiental de base física, el software científico abierto, la computación geoespacial de alto rendimiento y los pipelines de datos reproducibles que apoyan una mejor comprensión y gestión de los recursos hídricos.
