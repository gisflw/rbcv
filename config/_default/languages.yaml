          description: "Processos hidrológicos, comportamento de bacias, balanço hídrico, sistemas fluviais, cheias e secas, recursos hídricos, modelagem baseada em processos, calibração, incerteza e mudança ambiental."
        - title: "Geomática"
          icon: "earth-americas"
          description: "Análise espacial, representação do terreno, hidrografia, sensoriamento remoto, cobertura da terra, bancos de dados espaciais, delimitação de bacias, efeitos de escala e mapeamento ambiental."
        - title: "Sistemas de dados"
          icon: "database"
          description: "Bancos de dados ambientais, séries temporais, metadados, qualidade de dados, validação, fluxos de trabalho reprodutíveis, integração de dados, infraestrutura de dados e pipelines operacionais."
        - title: "Computação científica"
          icon: "code"
          description: "Desenvolvimento de software, modelagem numérica, automação, visualização, estatística, aprendizado de máquina, Python, SQL, Fortran e pesquisa reprodutível."
