    about:
      title: "Sobre"
      content: |-
        Sempre fui fascinado por entender como sistemas naturais funcionam e pelo papel que a tecnologia pode desempenhar para compreendê-los. Meu interesse por ciências ambientais cresceu junto com a curiosidade por computadores e programação, o que acabou me levando a uma carreira que combina essas áreas.

        Meu trabalho se concentra na construção de ferramentas e sistemas de dados para pesquisa e gestão operacional da água. Já trabalhei em temas como modelagem hidrológica em larga escala, previsão de cheias, avaliação de disponibilidade hídrica, sensoriamento remoto, análise de terreno e engenharia de dados geoespaciais. Gosto especialmente de desenhar fluxos de trabalho reprodutíveis que aproximam a pesquisa científica de aplicações no mundo real, sempre buscando criar sistemas robustos, transparentes e fáceis de estender.

        Tenho especial interesse por modelagem ambiental de base física, software científico aberto, computação geoespacial de alto desempenho e pipelines de dados reprodutíveis que apoiem uma melhor compreensão e gestão dos recursos hídricos.
