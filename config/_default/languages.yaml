      title: "Experiência"
      items:
        - company: "Universidade Federal do Rio Grande do Sul (UFRGS)"
          companyUrl: "https://www.ufrgs.br/"
          jobs:
            - name: "Pesquisador de pós-doutorado"
              companyDisplay: "[Universidade Federal do Rio Grande do Sul (UFRGS)](https://www.ufrgs.br/) em parceria com a [Agência Nacional de Águas e Saneamento Básico (ANA)](https://www.gov.br/ana/pt-br)"
              date: "Mar 2026 – atual"
              content: |-
                - Modelagem hidrológica em larga escala e análise de dados ambientais para aplicações nacionais no Brasil.
                - Avaliação de influências antrópicas e impactos de mudanças climáticas em sistemas hídricos.
                - Modelagem com o Modelo de Grandes Bacias (MGB).
            - name: "Pesquisador de pós-doutorado"
              companyDisplay: "[Universidade Federal do Rio Grande do Sul (UFRGS)](https://www.ufrgs.br/) em parceria com o [Serviço Geológico do Brasil (SGB)](https://www.sgb.gov.br/)"
              date: "Jul 2025 – atual"
              content: |-
                - Processamento e análise de dados geoespaciais e séries temporais para sistemas de alerta de cheias no Rio Grande do Sul.
                - Modelagem de nível e vazão, controle de qualidade, validação e apoio a dashboards.
        - company: "Agência Nacional de Águas e Saneamento Básico (ANA)"
          companyUrl: "https://www.gov.br/ana/pt-br"
          jobs:
            - name: "Consultor em hidrologia e dados geoespaciais"
              date: "Mai 2025 – Nov 2025"
              content: |-
                - Modelagem e estruturação de banco de dados relacional e geoespacial em PostgreSQL/PostGIS para bases de disponibilidade hídrica da Agência Nacional de Águas e Saneamento Básico (ANA).
                - Desenvolvimento de modelo de dados, rotinas de migração, funções de processamento, documentação e treinamento técnico.
        - company: "Instituto Cerrados"
          jobs:
            - name: "Consultor em modelagem hidrológica"
              date: "Jan 2025 – Set 2025"
              content: |-
                - Modelagem hidrológica e análise espacial para priorização de proteção e restauração de vegetação nativa no Cerrado.
                - Integração de sensoriamento remoto, séries climáticas, mapas de uso da terra, Python e QGIS.
        - company: "UK Centre for Ecology & Hydrology (UKCEH)"
          companyUrl: "https://www.ceh.ac.uk/"
          jobs:
            - name: "Spatial Data Scientist"
              date: "Jul 2022 – Mai 2025"
              content: |-
                - Análise, gestão e mapeamento de dados espaciais para o grupo Water Resources Systems.
                - Desenvolvimento de atributos de bacias para o [National River Flow Archive (NRFA)](https://nrfa.ceh.ac.uk/).
                - Ferramentas de processamento de LiDAR para o [Floods and Droughts Research Infrastructure (FDRI)](https://fdri.org.uk/).
                - Curadoria de dados de pesquisa pelo [Environmental Information Data Centre (EIDC)](https://eidc.ac.uk/).
        - company: "Universidade Federal do Rio Grande do Sul (UFRGS)"
          companyUrl: "https://www.ufrgs.br/"
          jobs:
            - name: "Pesquisador assistente"
              companyDisplay: "[Universidade Federal do Rio Grande do Sul (UFRGS)](https://www.ufrgs.br/) em parceria com a [Agência Nacional de Águas e Saneamento Básico (ANA)](https://www.gov.br/ana/pt-br)"
              date: "Jan 2020 – Jun 2022"
              content: |-
                - Compatibilização de modelagem hidrológica com rede hidrográfica vetorial.
                - Análise nacional de precipitação, umidade do solo, evapotranspiração e armazenamento de água.
                - Regionalização de vazões de referência com aprendizado de máquina e apoio ao Sistema de Contas Econômicas Ambientais para a Água (SEEA-Water) no Brasil.
    education:
      title: "Formação"
      items:
