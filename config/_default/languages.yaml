    hero:
      intro: "Olá, meu nome é"
      title: "Rafael Barbedo."
      subtitle: "Hidrologia, geoprocessamento e sistemas ambientais"
      content: >-
        Desenvolvo modelos hidrológicos, análises geoespaciais e sistemas de dados ambientais para aplicações de pesquisa, previsão hidrológica e gestão de recursos hídricos.
      button:
        name: "Baixar CV"
        url: "/cv/cv-pt.pdf"
        download: true
        newPage: false
    about:
      title: "Sobre"
      content: |-
        Sou hidrólogo, engenheiro civil e cientista de dados geoespaciais brasileiro, com experiência em modelagem hidrológica em larga escala, previsão de cheias, disponibilidade hídrica, sensoriamento remoto, topografia e sistemas reprodutíveis de dados ambientais.

        Meu trabalho combina pesquisa aplicada, desenvolvimento de software científico e engenharia de dados para transformar grandes bases ambientais em produtos úteis para modelagem, monitoramento e tomada de decisão.
      info:
        title: "Resumo do perfil"
        educationTitle: "Formação"
        languagesTitle: "Idiomas"
        interestsTitle: "Interesses"
      languages:
        - "Português: nativo"
        - "Inglês: fluente"
        - "Espanhol: fluente"
        - "Francê: intermediário"
      interests:
        - "🧗 Escalada"
        - "🚴 Ciclismo"
        - "🥾 Trilhas"
        - "🌿 Natureza"
        - "✈️ Viajar"
        - "📚 Leitura"
      skills:
        title: "Competências principais"
    skills:
      title: "Competências"
      intro: "Uma visão compacta dos domínios, métodos e ferramentas que uso em hidrologia, geoprocessamento e sistemas de dados ambientais."
      sets:
        - title: "Modelagem hidrológica"
          icon: "water"
          description: "Modelagem hidrológica em larga escala, previsão de cheias, disponibilidade hídrica e estimativa de vazões de referência."
        - title: "Ciência de dados geoespaciais"
          icon: "earth-americas"
          description: "Processamento e análise de topografia, sensoriamento remoto, uso do solo, LiDAR e bases espaciais de bacias."
        - title: "Engenharia de dados ambientais"
          icon: "database"
          description: "Pipelines reprodutíveis para séries temporais ambientais, bancos geoespaciais, controle de qualidade, validação e produtos de dados."
        - title: "Computação científica"
          icon: "code"
          description: "Desenvolvimento de software científico com Python, SQL, JavaScript, Fortran, modelagem estatística, aprendizado de máquina e deep learning."
      stack:
        - name: "Python"
          iconType: "devicon"
          icon: "python-plain"
        - name: "PostgreSQL"
          iconType: "devicon"
          icon: "postgresql-plain"
        - name: "SQLite"
          iconType: "devicon"
          icon: "sqlite-plain"
        - name: "VS Code"
          iconType: "devicon"
          icon: "vscode-plain"
        - name: "Linux"
          iconType: "devicon"
          icon: "linux-plain"
        - name: "Docker"
          iconType: "devicon"
          icon: "docker-plain"
        - name: "JavaScript"
          iconType: "devicon"
          icon: "javascript-plain"
        - name: "SQL"
          iconType: "fa"
          icon: "database"
        - name: "Fortran"
          iconType: "fa"
          icon: "terminal"
        - name: "NetCDF/Zarr"
          iconType: "fa"
          icon: "cube"
    experience:
      title: "Experiência"
      items:
        - company: "Universidade Federal do Rio Grande do Sul (UFRGS)"
          jobs:
            - name: "Pesquisador de pós-doutorado"
              companyDisplay: "Universidade Federal do Rio Grande do Sul (UFRGS) em parceria com a Agência Nacional de Águas e Saneamento Básico (ANA)"
              date: "Mar 2026 – atual"
              content: |-
                Modelagem hidrológica em larga escala e análise de dados ambientais para apoiar o desenvolvimento de aplicações hidrológicas nacionais no Brasil, com ênfase em influências antrópicas e impactos de mudanças climáticas.

                Projetos relacionados: [Aplicações hidrológicas nacionais](/pt/projects/national-hydrological-applications/) e [MGB em escala nacional](/pt/projects/mgb-national-scale/).
            - name: "Pesquisador de pós-doutorado"
              companyDisplay: "Universidade Federal do Rio Grande do Sul (UFRGS) em parceria com o Serviço Geológico do Brasil (SGB)"
              date: "Jul 2025 – atual"
              content: |-
                Processamento e análise de dados geoespaciais e séries temporais para aprimorar sistemas de alerta de cheias em bacias do Rio Grande do Sul.

                Projeto relacionado: [Sistema de alerta de cheias](/pt/projects/flood-early-warning/).
        - company: "Agência Nacional de Águas e Saneamento Básico (ANA)"
          jobs:
            - name: "Consultor em hidrologia e dados geoespaciais"
              date: "Mai 2025 – Nov 2025"
              content: |-
                Modelagem e estruturação de banco de dados relacional e geoespacial em PostgreSQL/PostGIS para unificar e padronizar bases de disponibilidade hídrica.

                Projeto relacionado: [Sistema brasileiro de disponibilidade hídrica](/pt/tools/brazilian-hydrological-availability-data-system/).
        - company: "Instituto Cerrados"
          jobs:
            - name: "Consultor em modelagem hidrológica"
              date: "Jan 2025 – Set 2025"
              content: |-
                Modelagem hidrológica e análise espacial para priorização de intervenções de proteção e restauração de vegetação nativa no Cerrado.

                Projeto relacionado: [Priorização hidrológica no Cerrado](/pt/projects/cerrado-hydrological-prioritisation/).
        - company: "UK Centre for Ecology & Hydrology (UKCEH)"
          jobs:
            - name: "Spatial Data Scientist"
              date: "Jul 2022 – Mai 2025"
              content: |-
                Processamento e gestão de bases hidrológicas e ambientais, atributos de bacias do NRFA, ferramentas para processamento de LiDAR no projeto FDRI e curadoria de dados para publicação no EIDC.

                Projetos relacionados: [CAMELS-GB v2](/pt/projects/camels-gb-v2/), [Atributos NRFA](/pt/projects/nrfa-catchment-attributes/) e [FDRI LiDAR](/pt/projects/fdri-lidar/).
        - company: "Universidade Federal do Rio Grande do Sul (UFRGS)"
          jobs:
            - name: "Pesquisador assistente"
              companyDisplay: "Universidade Federal do Rio Grande do Sul (UFRGS) em parceria com a Agência Nacional de Águas e Saneamento Básico (ANA)"
              date: "Jan 2020 – Jun 2022"
              content: |-
                Compatibilização de modelagem hidrológica com rede hidrográfica vetorial, análise de variáveis hidrológicas nacionais, aplicações de aprendizado de máquina para regionalização de vazões e apoio ao SEEA-Water no Brasil.

                Projetos relacionados: [Projeto de doutorado](/pt/projects/phd-data-integration/) e [Regionalização de vazões de referência](/pt/tools/reference-streamflow-dataset/).
    education:
      title: "Formação"
      items:
        - title: "Doutorado em Recursos Hídricos"
          school:
            name: "Universidade Federal do Rio Grande do Sul (UFRGS)"
          date: "2020 – 2024"
        - title: "Mestrado em Recursos Hídricos"
          school:
            name: "Universidade Federal do Rio Grande do Sul (UFRGS)"
          date: "2018 – 2020"
        - title: "Graduação em Engenharia Civil"
          school:
            name: "Pontifícia Universidade Católica do Rio Grande do Sul (PUCRS)"
          date: "2011 – 2016"
    projects:
      title: "Projetos"
      items:
        - title: "Aplicações hidrológicas nacionais"
          content: "Modelagem hidrológica em larga escala e integração de dados ambientais para aplicações nacionais no Brasil."
          image: "/images/projects/profile.png"
          featured:
            name: "Detalhes"
            link: "/pt/projects/national-hydrological-applications/"
          badges: ["Hidrologia", "MGB", "Brasil"]
        - title: "Sistema de alerta de cheias"
          content: "Processamento, validação e visualização de dados de nível e vazão para apoio à previsão e ao alerta de cheias."
          image: "/images/projects/profile2.jpg"
          featured:
            name: "Detalhes"
            link: "/pt/projects/flood-early-warning/"
          badges: ["Previsão de cheias", "Séries temporais", "Dashboards"]
        - title: "Priorização hidrológica no Cerrado"
          content: "Modelagem hidrológica e análise espacial para priorizar restauração e conservação de vegetação nativa."
          image: "/images/projects/converter.jpg"
          featured:
            name: "Detalhes"
            link: "/pt/projects/cerrado-hydrological-prioritisation/"
          badges: ["Cerrado", "PLANS", "QGIS"]
        - title: "Projeto de doutorado"
          content: "Integração de dados para análises hidrológicas no Brasil, incluindo armazenamento de água, extração de drenagem e regionalização de vazões."
          image: "/images/projects/profile.png"
          featured:
            name: "Tese"
            link: "https://lume.ufrgs.br/handle/10183/293616"
          badges: ["Hidrologia", "Brasil", "Machine Learning"]
    achievements:
      title: "Ferramentas & Dados"
      items:
        - title: "Rating Curve Explorer"
          content: "Ferramenta para organizar, visualizar e fazer análises iniciais de dados de vazão usados na derivação de curvas-chave."
          url: "https://github.com/barbedorafael/rating-curve-explorer"
          image: "/images/achievement.jpg"
        - title: "Brazilian Hydrological Availability Data System"
          content: "Framework ETL para consolidar dados hidrológicos geoespaciais no sistema de disponibilidade hídrica da ANA."
          url: "https://github.com/barbedorafael/db-disphid"
          image: "/images/achievement.jpg"
        - title: "Build Hydro Database Brazil"
          content: "Ferramentas para recuperar dados de vazão e precipitação da Rede Hidrometeorológica Nacional."
          url: "https://github.com/barbedorafael/build_hydrodb"
          image: "/images/achievement.jpg"
        - title: "Reference Streamflow Dataset"
          content: "Vazões médias e baixas de referência para mais de 400 mil pontos da rede hidrográfica brasileira, estimadas com modelos de aprendizado de máquina."
          url: "https://zenodo.org/records/14217002"
          image: "/images/achievement.jpg"
        - title: "BHO2MGB"
          content: "Plugin QGIS para processar a BHO no contexto do modelo hidrológico MGB."
          url: "https://www.ufrgs.br/hge/modelos-e-outros-produtos/bho2mgb/"
          image: "/images/achievement.jpg"
        - title: "TPS"
          content: "Algoritmo de extração de drenagem em MDEs baseado em posição topográfica."
          url: "https://github.com/barbedorafael/TPS"
          image: "/images/achievement.jpg"
    contact:
      title: "Contato"
